apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aiops-controller
  namespace: aiops-system
spec:
  parentRefs:
    - name: aks-gateway
      namespace: gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /aiops
      backendRefs:
        - name: aiops-controller
          port: 80
