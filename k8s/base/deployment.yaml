apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-sample-app
  labels:
    app: gitops-sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-sample-app
  template:
    metadata:
      labels:
        app: gitops-sample-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: content
          configMap:
            name: gitops-sample-content
