apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluegreen-green
  namespace: bluegreen-demo
  labels:
    app: bluegreen-demo
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bluegreen-demo
      version: green
  template:
    metadata:
      labels:
        app: bluegreen-demo
        version: green
    spec:
      nodeSelector:
        workload: user
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: content
          configMap:
            name: bluegreen-content-green
